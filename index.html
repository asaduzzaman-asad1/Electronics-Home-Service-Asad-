<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>Asad Electronics Service</title>
  <style>
    body { font-family: Arial; margin:0; background:#f4f4f4; }
    header { background:#0a3d62; color:white; padding:15px; text-align:center; }
    section { padding:20px; }
    .box { background:white; padding:15px; margin:10px 0; border-radius:10px; }
    input, textarea { width:100%; padding:10px; margin:5px 0; }
    button { background:#0a3d62; color:white; padding:10px; border:none; }
  </style>
</head>
<body>

<header>
  <h1>Asad Electronics Service</h1>
  <p>সব ধরনের ইলেকট্রনিক কাজ করা হয়</p>
</header>

<section>
  <div class="box">
    <h2>🔧 আমি যেসব কাজ করি</h2>
    <ul>
      <li>TV Repair</li>
      <li>Fan / Light</li>
      <li>Mobile Repair</li>
      <li>Speaker / Sound System</li>
    </ul>
  </div>

  <div class="box">
    <h2>📩 আপনার সমস্যা জানান</h2>
    <form>
      <input type="text" placeholder="আপনার নাম" required>
      <input type="text" placeholder="মোবাইল নাম্বার" required>
      <textarea placeholder="আপনার সমস্যা লিখুন" required></textarea>
      <button>Submit</button>
    </form>
  </div>

  <div class="box">
    <h2>📍 ঠিকানা ও সময়</h2>
    <p>ঠিকানা: (তোমার ঠিকানা লিখবা)</p>
    <p>সময়: সকাল ৯টা - রাত ৯টা</p>
  </div>
</section>

</body>
</html>
